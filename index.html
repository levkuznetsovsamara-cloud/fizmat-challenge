<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Физмат-челлендж | ЛАП №135</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: #0a0c1a;
        }

        /* ========== ЗАСТАВКА ========== */
        #introScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, #0a1030, #000000);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .formula {
            position: absolute;
            font-family: 'Courier New', 'Fira Code', monospace;
            font-weight: bold;
            color: rgba(46, 204, 64, 0.4);
            pointer-events: none;
            white-space: nowrap;
            animation: floatFormula linear infinite;
            text-shadow: 0 0 6px rgba(46,204,64,0.5);
            letter-spacing: 1px;
        }

        @keyframes floatFormula {
            0% { transform: translateX(-20vw) translateY(100vh) rotate(0deg); opacity: 0; }
            15% { opacity: 0.7; }
            85% { opacity: 0.5; }
            100% { transform: translateX(120vw) translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .particle {
            position: absolute;
            background: #2ecc40;
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
            box-shadow: 0 0 6px #2ecc40;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .intro-logo {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin-bottom: 30px;
            opacity: 0;
            transform: scale(0.6);
            transition: all 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
            filter: drop-shadow(0 0 10px rgba(46,204,64,0.3));
        }

        .intro-logo.show {
            opacity: 1;
            transform: scale(1);
            filter: drop-shadow(0 0 25px rgba(46,204,64,0.7));
        }

        .typewriter-text {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            color: #2ecc40;
            margin-bottom: 20px;
            min-height: 90px;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(46,204,64,0.6);
            font-family: monospace;
        }

        .typewriter-sub {
            font-size: 1.2rem;
            color: #bbd4ff;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .typewriter-sub.show {
            opacity: 1;
        }

        .btn-start {
            background: linear-gradient(135deg, #2ecc40, #1e8a30);
            border: none;
            padding: 16px 48px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #0a2f0a;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 0 20px rgba(46,204,64,0.8);
            transition: transform 0.2s, box-shadow 0.2s;
            opacity: 0;
            transform: translateY(20px);
        }

        .btn-start.show {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-start:active {
            transform: scale(0.96);
        }

        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 250;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        /* ========== ПЕРЕХОД ========== */
        #transitionScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 300;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #000;
        }

        .satellite-view {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0f2a, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .satellite-view img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .satellite-text {
            position: absolute;
            color: white;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.7);
            padding: 10px 24px;
            border-radius: 40px;
            bottom: 80px;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }

        .lyceum-zoom {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(1.4);
            transition: all 1.5s ease-out;
            z-index: 2;
            background: #000;
        }

        .lyceum-zoom.show {
            opacity: 1;
            transform: scale(1);
        }

        .lyceum-zoom img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ========== ИГРОВОЙ ЭКРАН ========== */
        #gameScreen {
            min-height: 100vh;
            display: none;
            padding: 20px;
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease;
            position: relative;
        }

        #gameScreen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 8, 18, 0.75);
            backdrop-filter: blur(2px);
            z-index: 0;
        }

        .game-container {
            position: relative;
            z-index: 2;
            max-width: 700px;
            margin: 0 auto;
            background: rgba(10, 18, 35, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 28px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            border: 1px solid rgba(46,204,64,0.3);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 24px;
            font-weight: bold;
            color: white;
            border-left: 4px solid #2ecc40;
        }

        .question-text {
            font-size: 1.55rem;
            font-weight: 700;
            color: white;
            margin: 20px 0;
            line-height: 1.4;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: rgba(14, 26, 43, 0.95);
            border: 1px solid #2ecc40;
            border-radius: 60px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
        }

        .option-btn:hover {
            background: rgba(46,204,64,0.25);
            transform: translateX(6px);
        }

        .feedback-message {
            background: rgba(7, 17, 38, 0.96);
            border-radius: 28px;
            padding: 16px;
            margin-top: 20px;
            color: #eef;
            border-left: 5px solid #2ecc40;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .btn {
            background: #2ecc40;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            color: #0a2a0a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn:hover {
            background: #27ae60;
            transform: scale(1.02);
        }

        .final-chance {
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(135deg, #2ecc40, #f9ca24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .contacts {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
        }

        .contacts a {
            color: #8bb9fe;
            text-decoration: none;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 40px;
            transition: 0.2s;
        }

        .contacts a:hover {
            background: #2ecc40;
            color: #000;
        }

        .hidden {
            display: none;
        }

        .contact-input-field {
            width: 100%;
            padding: 14px 20px;
            border-radius: 60px;
            border: 1px solid #2ecc40;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 1rem;
            margin: 15px 0;
            outline: none;
        }

        @media (max-width: 550px) {
            .typewriter-text { font-size: 1.6rem; }
            .question-text { font-size: 1.2rem; }
            .game-container { padding: 18px; }
            .btn-start { padding: 12px 32px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div id="introScreen">
    <div class="flash" id="flash"></div>
    <img class="intro-logo" id="introLogo" src="logo.png" alt="ЛАП №135" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<div style=\"font-size:70px;\">🧪⚛️</div>')">
    <div class="typewriter-text" id="typewriter"></div>
    <div class="typewriter-sub" id="typewriterSub">Проверь свои шансы!</div>
    <button class="btn-start" id="startIntroBtn">🚀 Начать!</button>
</div>

<div id="transitionScreen">
    <div class="satellite-view">
        <img id="satelliteImg" src="satellite.jpg" alt="Спутник" onerror="this.src=''; this.parentElement.innerHTML='<div style=\"font-size:80px;\">🛰️</div><div class=\"satellite-text\">Снимок со спутника...</div>'">
        <div class="satellite-text">🛰️ Снимок со спутника...</div>
    </div>
    <div class="lyceum-zoom" id="lyceumZoom">
        <img id="lyceumImg" src="lyceum.jpg" alt="Лицей" onerror="this.src=''; this.parentElement.innerHTML='<div style=\"font-size:80px;\">🏫</div>'">
    </div>
</div>

<div id="gameScreen">
    <div class="game-container">
        <div class="stats-bar">
            <span id="questionCounter">Вопрос 1 / 5</span>
            <span>🎯 Шанс: <span id="currentChance">0</span>%</span>
        </div>
        <div class="question-text" id="questionText"></div>
        <div class="options-grid" id="optionsContainer"></div>
        <button class="btn" id="abortGameBtn">✖️ Завершить игру</button>
        <div id="feedbackArea" class="feedback-message hidden"></div>
    </div>
</div>

<script>
    // ========== ФОНЫ ==========
    const bgList = [];
    for (let i = 1; i <= 17; i++) bgList.push(`bg${i}.jpg`);
    let bgIndex = 0, bgInterval = null;

    function setGameBackground(bgPath) {
        const screen = document.getElementById('gameScreen');
        const img = new Image();
        img.onload = () => {
            screen.style.backgroundImage = `url('${bgPath}')`;
            screen.style.backgroundSize = 'cover';
            screen.style.backgroundPosition = 'center';
        };
        img.onerror = () => {
            screen.style.backgroundImage = 'radial-gradient(ellipse at 40% 50%, #0f172a, #020617)';
        };
        img.src = bgPath;
    }

    function startBgRotation() {
        if (bgInterval) clearInterval(bgInterval);
        setGameBackground(bgList[0]);
        bgInterval = setInterval(() => {
            bgIndex = (bgIndex + 1) % bgList.length;
            setGameBackground(bgList[bgIndex]);
        }, 10000);
    }

    function stopBgRotation() {
        if (bgInterval) { clearInterval(bgInterval); bgInterval = null; }
    }

    // ========== МУЗЫКА ==========
    let introMusic = null, gameMusic = null;
    function playIntro() {
        try {
            introMusic = new Audio('intro-music.mp3');
            introMusic.loop = true;
            introMusic.volume = 0.3;
            introMusic.play().catch(() => {});
        } catch(e) {}
    }
    function stopIntro() { if(introMusic) { introMusic.pause(); introMusic = null; } }
    function playGameMusic() {
        try {
            gameMusic = new Audio('game-music.mp3');
            gameMusic.loop = true;
            gameMusic.volume = 0.3;
            gameMusic.play().catch(() => {});
        } catch(e) {}
    }
    function stopGameMusic() { if(gameMusic) { gameMusic.pause(); gameMusic = null; } }

    // ========== ЧАСТИЦЫ И ФОРМУЛЫ ==========
    const formulasList = ['E=mc²', 'F=ma', '∫eˣ dx', 'πr²', 'a²+b²=c²', 'Δx·Δp ≥ ħ/2', 'v = s/t', 'PV = nRT', '∇·B = 0', 'F = G·m₁m₂/r²'];
    function createFloating() {
        const intro = document.getElementById('introScreen');
        for(let i=0; i<22; i++) {
            const el = document.createElement('div');
            el.className = 'formula';
            el.textContent = formulasList[Math.floor(Math.random() * formulasList.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.fontSize = (Math.random() * 24 + 14) + 'px';
            el.style.animationDuration = Math.random() * 12 + 10 + 's';
            el.style.animationDelay = Math.random() * 8 + 's';
            intro.appendChild(el);
        }
        for(let i=0; i<90; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            let s = Math.random() * 4 + 1.5;
            p.style.width = s + 'px'; p.style.height = s + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = Math.random() * 6 + 4 + 's';
            p.style.animationDelay = Math.random() * 6 + 's';
            p.style.opacity = Math.random() * 0.6 + 0.2;
            intro.appendChild(p);
        }
    }
    createFloating();

    // ========== ПЕЧАТНЫЙ ТЕКСТ ==========
    const title = "Физмат-челлендж";
    let ti = 0;
    function typeWriter() {
        const el = document.getElementById('typewriter');
        if (ti < title.length) {
            el.innerHTML += title.charAt(ti);
            ti++;
            setTimeout(typeWriter, 90);
        } else {
            setTimeout(() => {
                document.getElementById('typewriterSub').classList.add('show');
                document.getElementById('startIntroBtn').classList.add('show');
            }, 200);
        }
    }

    // Старт заставки
    setTimeout(() => {
        const flash = document.getElementById('flash');
        flash.style.opacity = '1';
        setTimeout(() => flash.style.opacity = '0', 150);
        const logo = document.getElementById('introLogo');
        if(logo) logo.classList.add('show');
        setTimeout(() => {
            typeWriter();
            playIntro();
        }, 500);
    }, 500);

    // ========== ПЕРЕХОД (спутник -> лицей) ==========
    function runTransition() {
        return new Promise((resolve) => {
            const transDiv = document.getElementById('transitionScreen');
            const zoomDiv = document.getElementById('lyceumZoom');
            transDiv.style.display = 'flex';
            setTimeout(() => {
                zoomDiv.classList.add('show');
                setTimeout(() => {
                    transDiv.style.display = 'none';
                    zoomDiv.classList.remove('show');
                    resolve();
                }, 1500);
            }, 2000);
        });
    }

    // ========== БАНК ВОПРОСОВ ==========
    const QUESTION_BANK = [
        { text: "Что тяжелее: 1 кг пуха или 1 кг железа?", options: ["Пух", "Железо", "Одинаково", "Зависит от места"], correct: 2, explanation: "Килограмм есть килограмм. Масса одинаковая.", comfort: "Не переживай, это ловушка, в которую попадается каждый второй!" },
        { text: "Если вы подниметесь на гору высотой 1 км, вы похудеете?", options: ["Да, заметно", "Да, но совсем чуть-чуть", "Нет, вес не изменится", "Нет, даже потолстеете"], correct: 1, explanation: "Сила тяжести с высотой уменьшается, вес становится меньше на граммы.", comfort: "Отличная идея — худеть, гуляя в горы! Но придётся всё равно считать калории." },
        { text: "Что быстрее нагреется на солнце: белая футболка или чёрная?", options: ["Белая", "Чёрная", "Одинаково", "Зависит от ветра"], correct: 1, explanation: "Чёрный цвет поглощает почти все лучи света и превращает их в тепло.", comfort: "Любишь чёрный? Летом это дорого обходится!" },
        { text: "Как разделить 5 яблок между 5 детьми, чтобы одно осталось в корзине?", options: ["Отдать 4 яблока", "Отдать яблоки вместе с корзиной", "Съесть одно самому", "Так нельзя"], correct: 1, explanation: "Четырём детям отдать по яблоку, а пятому — яблоко вместе с корзиной.", comfort: "Хитрая логическая задачка. Теперь ты будешь знать — корзину тоже можно раздавать!" },
        { text: "Что произойдёт с часами в сауне?", options: ["Начнут спешить", "Начнут отставать", "Остановятся", "Будут идти точно"], correct: 0, explanation: "Металлические детали от нагрева расширяются, часы спешат.", comfort: "Сауна — место для отдыха, а не для точного хронометража." },
        { text: "Ускорение камня в верхней точке полёта?", options: ["0", "9,8 м/с² вниз", "9,8 м/с² вверх", "Зависит от массы"], correct: 1, explanation: "Ускорение свободного падения действует на камень всегда.", comfort: "Многие думают, что раз скорость ноль — то и ускорения нет. Но Земля никуда не девается!" },
        { text: "Что длиннее: экватор или меридиан?", options: ["Экватор", "Меридиан", "Одинаково", "Неизвестно"], correct: 0, explanation: "Земля сплюснута у полюсов, поэтому экватор длиннее на 67 км.", comfort: "Разница настолько мала, что на картах её не видно." },
        { text: "Почему металл кажется холоднее дерева в мороз?", options: ["Металл холоднее", "Металл быстрее отводит тепло", "Дерево нагревается", "Просто ощущение"], correct: 1, explanation: "Металл отлично проводит тепло и быстро «вытягивает» его из руки.", comfort: "Ты просто слишком честный: если холодно — сразу говоришь об этом." },
        { text: "На сколько удлинить верёвку, чтобы она провисла на 1 м над Землёй?", options: ["6,28 м", "1 м", "628 м", "1 км"], correct: 0, explanation: "Из формулы C = 2πR увеличение радиуса на 1 м даёт удлинение на 2π ≈ 6,28 м.", comfort: "Интуиция подсказывала километры, а математика говорит — 6 метров. Удивительно!" },
        { text: "Почему солнце утром и вечером кажется больше?", options: ["Оно ближе", "Иллюзия из-за горизонта", "Преломление света", "Меняет размер"], correct: 1, explanation: "На горизонте мы сравниваем солнце с деревьями и домами — оно кажется огромным.", comfort: "Твой глаз иногда обманывает тебя. И это нормально!" }
    ];

    function getRandomQuestions(n) {
        const shuffled = [...QUESTION_BANK];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, n);
    }

    let currentQuestions = [], qIdx = 0, currentChance = 0, waiting = false, nextTimer = null;

    function updateUI() {
        document.getElementById('questionCounter').innerHTML = `📋 Вопрос ${qIdx+1} / ${currentQuestions.length}`;
        document.getElementById('currentChance').innerText = currentChance;
    }

    function renderQuestion() {
        if (qIdx >= currentQuestions.length) {
            finishGame();
            return;
        }
        const q = currentQuestions[qIdx];
        document.getElementById('questionText').innerText = q.text;
        const container = document.getElementById('optionsContainer');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `${String.fromCharCode(65+idx)}. ${opt}`;
            btn.addEventListener('click', () => handleAnswer(idx));
            container.appendChild(btn);
        });
        document.getElementById('feedbackArea').classList.add('hidden');
        waiting = false;
        document.querySelectorAll('.option-btn').forEach(btn => btn.style.pointerEvents = 'auto');
    }

    function handleAnswer(selected) {
        if (waiting) return;
        const q = currentQuestions[qIdx];
        const correct = (selected === q.correct);
        let feedbackHtml = '';
        if (correct) {
            let add = 18;
            let newVal = currentChance + add;
            if (newVal > 90) newVal = 90;
            currentChance = newVal;
            feedbackHtml = `<span style="color:#8effa5;">✅ ПРАВИЛЬНО! +18% к шансу</span><br>📘 ${q.explanation}<br>✨ ${q.comfort}`;
        } else {
            currentChance = 0;
            const rightLetter = String.fromCharCode(65 + q.correct);
            feedbackHtml = `<span style="color:#ffae70;">❌ НЕПРАВИЛЬНО. Шанс обнулён!</span><br>Верный ответ: ${rightLetter}. ${q.options[q.correct]}<br>📘 ${q.explanation}<br>💪 ${q.comfort}`;
        }
        document.getElementById('feedbackArea').innerHTML = feedbackHtml;
        document.getElementById('feedbackArea').classList.remove('hidden');
        waiting = true;
        document.querySelectorAll('.option-btn').forEach(btn => btn.style.pointerEvents = 'none');
        updateUI();
        if (nextTimer) clearTimeout(nextTimer);
        nextTimer = setTimeout(() => {
            qIdx++;
            if (qIdx < currentQuestions.length) {
                waiting = false;
                renderQuestion();
            } else {
                finishGame();
            }
            nextTimer = null;
        }, 2000);
    }

    function finishGame() {
        if (nextTimer) clearTimeout(nextTimer);
        stopBgRotation();
        stopGameMusic();
        const finalPercent = currentChance;
        let msg = "";
        if (finalPercent >= 70) msg = "🔥 Ты настоящий физмат-боец! Поступление почти гарантировано!";
        else if (finalPercent >= 40) msg = "✨ Хороший результат! Подтяни пару тем и всё получится.";
        else msg = "💪 Не сдавайся! Выучи физику с математикой — у тебя огромный потенциал!";
        
        const container = document.querySelector('#gameScreen .game-container');
        container.innerHTML = `
            <div style="text-align:center; padding:20px;">
                <div class="final-chance">${finalPercent}%</div>
                <p style="color:white; margin:20px; font-size:1.2rem;">${msg}</p>
                <input type="text" id="finalContactInput" class="contact-input-field" placeholder="📱 Телефон или @username">
                <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
                    <button id="saveContactBtn" class="btn" style="background:#2c3e66;">💾 Оставить контакт</button>
                    <button id="playAgainBtn" class="btn">🔄 Сыграть ещё раз</button>
                </div>
                <div class="contacts">
                    <a href="https://forms.yandex.ru/u/69d495094936395d76329310/" target="_blank">📝 Яндекс Форма</a>
                    <a href="https://lap-samara.ru" target="_blank">🌐 Сайт</a>
                    <a href="https://vk.com/lap135" target="_blank">📘 VK</a>
                    <a href="https://t.me/s/lap135" target="_blank">📱 Telegram</a>
                    <a href="tel:+78469954245">📞 Телефон</a>
                </div>
            </div>
        `;
        document.getElementById('saveContactBtn')?.addEventListener('click', () => {
            const contact = document.getElementById('finalContactInput').value.trim();
            if (contact) {
                console.log("[КОНТАКТ]:", contact);
                alert(`Спасибо, ${contact}! Мы свяжемся.`);
            } else alert("Вы не ввели контакт, но старания засчитаны!");
        });
        document.getElementById('playAgainBtn')?.addEventListener('click', () => location.reload());
    }

    function startGame() {
        currentQuestions = getRandomQuestions(5);
        qIdx = 0;
        currentChance = 0;
        waiting = false;
        updateUI();
        renderQuestion();
    }

    // ========== ГЛАВНЫЙ СТАРТ ПО КНОПКЕ ==========
    document.getElementById('startIntroBtn').addEventListener('click', async () => {
        stopIntro();
        const flash = document.getElementById('flash');
        flash.style.opacity = '1';
        setTimeout(() => flash.style.opacity = '0', 200);
        const introDiv = document.getElementById('introScreen');
        introDiv.style.opacity = '0';
        setTimeout(async () => {
            introDiv.style.display = 'none';
            await runTransition();
            document.getElementById('gameScreen').style.display = 'block';
            playGameMusic();
            startBgRotation();
            startGame();
        }, 1000);
    });

    // Кнопка "Завершить игру"
    document.getElementById('abortGameBtn').addEventListener('click', () => {
        location.reload();
    });
</script>
</body>
</html>
