<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Физмат-челлендж | ЛАП №135</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            background: #0a0c1a;
            overflow-x: hidden;
        }
        /* ЗАСТАВКА (только градиент) */
        #introScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, #050a1a, #000000);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.2s ease;
        }
        /* Летающие формулы и частицы */
        .formula {
            position: absolute;
            font-size: 1.4rem;
            font-weight: bold;
            color: rgba(100, 180, 255, 0.4);
            pointer-events: none;
            white-space: nowrap;
            animation: floatFormula linear infinite;
            font-family: monospace;
        }
        @keyframes floatFormula {
            0% { transform: translateX(-20vw) translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.4; }
            100% { transform: translateX(120vw) translateY(-20vh) rotate(360deg); opacity: 0; }
        }
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-20vh); opacity: 0; }
        }
        .intro-logo {
            width: 160px;
            height: 160px;
            margin-bottom: 30px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
            object-fit: contain;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            padding: 10px;
        }
        .intro-logo.show {
            opacity: 1;
            transform: scale(1);
            filter: drop-shadow(0 0 30px rgba(255,215,0,0.6));
        }
        .typewriter-text {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            color: white;
            margin-bottom: 20px;
            min-height: 100px;
            letter-spacing: 2px;
        }
        .typewriter-sub {
            font-size: 1.2rem;
            color: #aac8ff;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .typewriter-sub.show { opacity: 1; }
        .btn-start {
            background: linear-gradient(135deg, #00e676, #00c853);
            border: none;
            padding: 16px 48px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #1a2a1a;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 0 20px rgba(0,230,118,0.5);
            opacity: 0;
            transform: translateY(20px);
            transition: 0.3s;
        }
        .btn-start.show { opacity: 1; transform: translateY(0); }
        .btn-start:active { transform: scale(0.96); }
        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 250;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
        }
        /* ПЕРЕХОД (спутник -> лицей) */
        #transitionScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 300;
            display: none;
            background: #000;
        }
        .satellite-view {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0f2a, #000);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }
        .satellite-view img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .satellite-text {
            position: absolute;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 30px;
            bottom: 50px;
            font-family: monospace;
        }
        .lyceum-zoom {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(1.5);
            transition: all 1.5s ease-out;
            z-index: 2;
            background: #000;
        }
        .lyceum-zoom.show { opacity: 1; transform: scale(1); }
        .lyceum-zoom img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* ИГРОВОЙ ЭКРАН */
        #gameScreen {
            min-height: 100vh;
            display: none;
            padding: 20px;
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease;
        }
        .game-container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            padding: 12px 16px;
            border-radius: 60px;
            margin-bottom: 24px;
            font-weight: bold;
            color: white;
        }
        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin: 20px 0;
        }
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background: #0e1a2b;
            border: 1px solid #2c4b7c;
            border-radius: 60px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-btn:active { transform: scale(0.98); background: #1f4970; }
        .feedback-message {
            background: #071126cc;
            border-radius: 28px;
            padding: 14px;
            margin-top: 15px;
            color: white;
            border-left: 5px solid #ffb347;
        }
        .btn {
            background: #2b5f9e;
            border: none;
            padding: 14px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
        }
        .final-chance {
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(135deg, #FFD966, #FFA447);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .contacts a {
            color: #8bb9fe;
            text-decoration: none;
            margin: 0 8px;
        }
        .hidden { display: none; }
        @media (max-width: 550px) {
            .typewriter-text { font-size: 1.8rem; }
            .btn-start { padding: 12px 32px; font-size: 1.2rem; }
            .question-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<!-- ЗАСТАВКА -->
<div id="introScreen">
    <div class="flash" id="flash"></div>
    <img class="intro-logo" id="introLogo" src="logo.png" alt="ЛАП №135" onerror="this.style.display='none'">
    <div class="typewriter-text" id="typewriter"></div>
    <div class="typewriter-sub" id="typewriterSub">Проверь свои шансы!</div>
    <button class="btn-start" id="startIntroBtn">🚀 Начать!</button>
</div>

<!-- ПЕРЕХОД -->
<div id="transitionScreen">
    <div class="satellite-view">
        <img src="satellite.jpg" alt="Спутник" onerror="this.style.display='none'">
        <div class="satellite-text">🛰️ Снимок со спутника...</div>
    </div>
    <div class="lyceum-zoom" id="lyceumZoom">
        <img src="lyceum.jpg" alt="Лицей №135" onerror="this.style.display='none'">
    </div>
</div>

<!-- ИГРОВОЙ ЭКРАН -->
<div id="gameScreen">
    <div class="game-container">
        <div class="stats-bar">
            <span id="questionCounter">Вопрос 1 / 5</span>
            <span>🎲 Шанс: <span id="currentChance">0</span>%</span>
        </div>
        <div class="question-text" id="questionText"></div>
        <div class="options-grid" id="optionsContainer"></div>
        <button class="btn" id="abortGameBtn">✖️ Завершить игру</button>
        <div id="feedbackArea" class="feedback-message hidden"></div>
    </div>
</div>

<script>
    // === ФОНЫ: 17 штук, переключение каждые 10 секунд ===
    const gameBackgrounds = [];
    for (let i = 1; i <= 17; i++) gameBackgrounds.push(`bg${i}.jpg`);
    let bgIndex = 0, bgInterval = null;

    // === МУЗЫКА (опционально) ===
    let introMusic = null, gameMusic = null;

    function playIntroMusic() {
        try {
            introMusic = new Audio('intro-music.mp3');
            introMusic.loop = true;
            introMusic.volume = 0.3;
            introMusic.play().catch(() => {});
        } catch(e) {}
    }
    function stopIntroMusic() {
        if (introMusic) { introMusic.pause(); introMusic = null; }
    }
    function startGameMusic() {
        try {
            gameMusic = new Audio('game-music.mp3');
            gameMusic.loop = true;
            gameMusic.volume = 0.3;
            gameMusic.play().catch(() => {});
        } catch(e) {}
    }
    function stopGameMusic() {
        if (gameMusic) { gameMusic.pause(); gameMusic = null; }
    }

    // установка фона игры (если картинки нет — градиент)
    function setGameBackground(bgName) {
        const gs = document.getElementById('gameScreen');
        const img = new Image();
        img.onload = () => {
            gs.style.backgroundImage = `url('${bgName}')`;
            gs.style.backgroundSize = 'cover';
            gs.style.backgroundPosition = 'center';
        };
        img.onerror = () => {
            gs.style.backgroundImage = '';
            gs.style.background = 'linear-gradient(rgba(10,15,30,0.85), rgba(5,10,25,0.9))';
        };
        img.src = bgName;
    }

    function startBackgroundRotation() {
        if (bgInterval) clearInterval(bgInterval);
        setGameBackground(gameBackgrounds[0]);
        bgInterval = setInterval(() => {
            bgIndex = (bgIndex + 1) % gameBackgrounds.length;
            setGameBackground(gameBackgrounds[bgIndex]);
        }, 10000);
    }

    // === ЛЕТАЮЩИЕ ФОРМУЛЫ И ЧАСТИЦЫ ===
    const formulas = ['E=mc²', 'F=ma', '∫f(x)dx', 'πr²', 'a²+b²=c²', 'Δx·Δp≥ħ/2', 'v=s/t', 'PV=nRT'];
    function createFloatingFormulas() {
        const intro = document.getElementById('introScreen');
        for (let i = 0; i < 15; i++) {
            const f = document.createElement('div');
            f.className = 'formula';
            f.textContent = formulas[Math.floor(Math.random() * formulas.length)];
            f.style.left = Math.random() * 100 + '%';
            f.style.fontSize = (Math.random() * 20 + 14) + 'px';
            f.style.animationDuration = Math.random() * 12 + 8 + 's';
            f.style.animationDelay = Math.random() * 8 + 's';
            intro.appendChild(f);
        }
    }
    function createParticles() {
        const intro = document.getElementById('introScreen');
        for (let i = 0; i < 80; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const s = Math.random() * 3 + 1;
            p.style.width = s + 'px';
            p.style.height = s + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = Math.random() * 5 + 3 + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            p.style.opacity = Math.random() * 0.6;
            intro.appendChild(p);
        }
    }
    createParticles();
    createFloatingFormulas();

    // === ПЕЧАТНЫЙ ТЕКСТ ===
    const fullText = "Физмат-челлендж";
    let textIndex = 0;
    function typeWriter() {
        const el = document.getElementById('typewriter');
        if (textIndex < fullText.length) {
            el.innerHTML += fullText.charAt(textIndex);
            textIndex++;
            setTimeout(typeWriter, 100);
        } else {
            setTimeout(() => {
                document.getElementById('typewriterSub').classList.add('show');
                document.getElementById('startIntroBtn').classList.add('show');
            }, 300);
        }
    }

    // Вспышка и появление логотипа
    setTimeout(() => {
        const flash = document.getElementById('flash');
        flash.style.opacity = '1';
        setTimeout(() => { flash.style.opacity = '0'; }, 150);
        document.getElementById('introLogo').classList.add('show');
        setTimeout(() => {
            typeWriter();
            playIntroMusic();
        }, 500);
    }, 500);

    // === ПЕРЕХОД "СПУТНИК → ЛИЦЕЙ" ===
    function playTransitionToLyceum() {
        return new Promise((resolve) => {
            const td = document.getElementById('transitionScreen');
            const lz = document.getElementById('lyceumZoom');
            td.style.display = 'flex';
            setTimeout(() => {
                lz.classList.add('show');
                setTimeout(() => {
                    td.style.display = 'none';
                    lz.classList.remove('show');
                    resolve();
                }, 1500);
            }, 2000);
        });
    }

    // === КНОПКА "НАЧАТЬ!" ===
    document.getElementById('startIntroBtn').addEventListener('click', async () => {
        stopIntroMusic();
        const flash = document.getElementById('flash');
        flash.style.opacity = '1';
        setTimeout(() => { flash.style.opacity = '0'; }, 200);
        const intro = document.getElementById('introScreen');
        intro.style.opacity = '0';
        setTimeout(async () => {
            intro.style.display = 'none';
            await playTransitionToLyceum();
            document.getElementById('gameScreen').style.display = 'block';
            startGameMusic();
            startBackgroundRotation();
            startNewGame();
        }, 1000);
    });

    // === БАНК ВОПРОСОВ (10 шт) ===
    const QUESTION_BANK = [
        { text: "Что тяжелее: 1 кг пуха или 1 кг железа?", options: ["Пух", "Железо", "Одинаково", "Зависит от места"], correct: 2, explanation: "Килограмм есть килограмм. Масса одинаковая.", comfort: "Не переживай, это ловушка, в которую попадается каждый второй!" },
        { text: "Если вы подниметесь на гору высотой 1 км, вы похудеете?", options: ["Да, заметно", "Да, но совсем чуть-чуть", "Нет, вес не изменится", "Нет, даже потолстеете"], correct: 1, explanation: "Сила тяжести с высотой уменьшается, вес становится меньше на граммы.", comfort: "Отличная идея — худеть, гуляя в горы! Но придётся всё равно считать калории." },
        { text: "Что быстрее нагреется на солнце: белая футболка или чёрная?", options: ["Белая", "Чёрная", "Одинаково", "Зависит от ветра"], correct: 1, explanation: "Чёрный цвет поглощает почти все лучи света и превращает их в тепло.", comfort: "Любишь чёрный? Летом это дорого обходится!" },
        { text: "Как разделить 5 яблок между 5 детьми, чтобы одно яблоко осталось в корзине?", options: ["Отдать 4 яблока", "Отдать яблоки вместе с корзиной", "Съесть одно самому", "Так нельзя"], correct: 1, explanation: "Четырём детям отдать по яблоку, а пятому — яблоко вместе с корзиной.", comfort: "Хитрая логическая задачка. Теперь ты будешь знать — корзину тоже можно раздавать!" },
        { text: "Что произойдёт с обычными механическими часами, если их перенести из квартиры в сауну?", options: ["Начнут спешить", "Начнут отставать", "Остановятся", "Будут идти точно так же"], correct: 0, explanation: "Металлические детали от нагрева расширяются, маятник или пружина меняют свойства, часы спешат.", comfort: "Сауна — место для отдыха, а не для точного хронометража." },
        { text: "Камень бросили вертикально вверх. В самой верхней точке его скорость равна нулю. Чему равно ускорение камня в этот момент?", options: ["0", "9,8 м/с² вниз", "9,8 м/с² вверх", "Зависит от массы камня"], correct: 1, explanation: "Ускорение свободного падения действует на камень всегда, даже в верхней точке.", comfort: "Многие думают, что раз скорость ноль — то и ускорения нет. Но Земля никуда не девается!" },
        { text: "Что длиннее: окружность Земли по экватору или меридиану?", options: ["Экватор", "Меридиан", "Одинаково", "Точно неизвестно"], correct: 0, explanation: "Земля сплюснута у полюсов, поэтому экватор чуть длиннее меридиана — примерно на 67 км.", comfort: "Честно говоря, разница настолько мала, что на картах её не видно." },
        { text: "Почему в сильный мороз металлические предметы на улице кажутся холоднее деревянных?", options: ["Металл холоднее по температуре", "Металл быстрее отводит тепло от руки", "Дерево нагревается солнцем", "Это просто ощущение, разницы нет"], correct: 1, explanation: "Металл отлично проводит тепло и быстро «вытягивает» его из руки.", comfort: "Ты просто слишком честный: если холодно — сразу говоришь об этом." },
        { text: "Представьте Землю как идеальный шар. Вы обмотали её верёвкой по экватору. На сколько нужно удлинить верёвку, чтобы она провисла ровно на 1 метр над поверхностью?", options: ["На 6,28 метра", "На 1 метр", "На 628 метров", "На 1 километр"], correct: 0, explanation: "Из формулы C = 2πR увеличение радиуса на 1 м даёт удлинение на 2π ≈ 6,28 м.", comfort: "Интуиция подсказывала километры, а математика говорит — 6 метров. Удивительно, правда?" },
        { text: "Почему вечером и утром солнце на небе выглядит больше, чем в полдень?", options: ["Оно действительно ближе к Земле", "Это иллюзия из-за сравнения с предметами на горизонте", "Из-за преломления света в атмосфере", "Вечером солнце меняет размер"], correct: 1, explanation: "На горизонте мы сравниваем солнце с деревьями и домами — оно кажется огромным.", comfort: "Твой глаз иногда обманывает тебя. И это нормально — так устроено зрение." }
    ];

    let currentGameQuestions = [], currentQIndex = 0, currentChance = 0, waitingForNext = false, timeoutId = null;

    function getRandomQuestions(count) {
        const shuffled = [...QUESTION_BANK];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
    }

    function updateUIStats() {
        document.getElementById('questionCounter').innerText = `Вопрос ${currentQIndex+1} / ${currentGameQuestions.length}`;
        document.getElementById('currentChance').innerText = currentChance;
    }

    function renderCurrentQuestion() {
        if (currentQIndex >= currentGameQuestions.length) {
            finishGame();
            return;
        }
        const q = currentGameQuestions[currentQIndex];
        document.getElementById('questionText').innerText = q.text;
        const container = document.getElementById('optionsContainer');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `${String.fromCharCode(65+idx)}. ${opt}`;
            btn.addEventListener('click', () => handleAnswer(idx));
            container.appendChild(btn);
        });
        document.getElementById('feedbackArea').classList.add('hidden');
        waitingForNext = false;
    }

    function handleAnswer(selectedIdx) {
        if (waitingForNext) return;
        const q = currentGameQuestions[currentQIndex];
        const isCorrect = (selectedIdx === q.correct);
        if (isCorrect) {
            let newChance = currentChance + 18;
            if (newChance > 90) newChance = 90;
            currentChance = newChance;
            document.getElementById('feedbackArea').innerHTML = `<span style="color:#8effa5;">✅ ПРАВИЛЬНО!</span><br>📘 ${q.explanation}<br>✨ ${q.comfort}`;
        } else {
            const correctLetter = String.fromCharCode(65+q.correct);
            document.getElementById('feedbackArea').innerHTML = `<span style="color:#ffae70;">❌ НЕПРАВИЛЬНО</span><br>Верный ответ: ${correctLetter}. ${q.options[q.correct]}<br>📘 ${q.explanation}<br>💪 ${q.comfort}`;
        }
        document.getElementById('feedbackArea').classList.remove('hidden');
        document.querySelectorAll('.option-btn').forEach(btn => btn.style.pointerEvents = 'none');
        waitingForNext = true;
        updateUIStats();
        if (timeoutId) clearTimeout(timeoutId);
        timeoutId = setTimeout(() => {
            currentQIndex++;
            if (currentQIndex < currentGameQuestions.length) {
                waitingForNext = false;
                renderCurrentQuestion();
            } else {
                finishGame();
            }
            timeoutId = null;
        }, 1500);
    }

    function finishGame() {
        if (timeoutId) clearTimeout(timeoutId);
        if (bgInterval) clearInterval(bgInterval);
        stopGameMusic();
        const container = document.querySelector('#gameScreen .game-container');
        container.innerHTML = `<div style="text-align:center; padding:40px;">
            <div class="final-chance">${currentChance}%</div>
            <p style="color:white; margin:20px;">Спасибо за игру! Твой шанс поступления — ${currentChance}%</p>
            <input type="text" id="contactInput" class="input-field" placeholder="Телефон или @username" style="width:100%; padding:12px; border-radius:60px; background:#0a1022; border:1px solid #2f5582; color:white; margin:16px 0;">
            <div class="flex-row" style="display:flex; gap:12px; flex-wrap:wrap;">
                <button class="btn" id="submitContactBtn" style="flex:1;">📩 Оставить контакт</button>
                <button class="btn" id="restartBtn" style="flex:1;">🔄 Сыграть ещё раз</button>
            </div>
