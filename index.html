<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Физмат-челлендж | ЛАП №135</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, 'Roboto', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: #0a0c1a;
        }

        /* ===== ЗАСТАВКА ===== */
        #introScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, #0a1030, #000000);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.2s ease-in-out;
        }

        .formula {
            position: absolute;
            font-size: 1.4rem;
            font-weight: bold;
            color: rgba(100, 200, 255, 0.35);
            pointer-events: none;
            white-space: nowrap;
            animation: floatFormula linear infinite;
            font-family: monospace;
            text-shadow: 0 0 5px rgba(0,255,100,0.3);
        }

        @keyframes floatFormula {
            0% { transform: translateX(-20vw) translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.4; }
            100% { transform: translateX(120vw) translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .particle {
            position: absolute;
            background: #2ecc40;
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
            box-shadow: 0 0 4px #2ecc40;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .intro-logo {
            width: 160px;
            height: 160px;
            margin-bottom: 30px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
            object-fit: contain;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            padding: 10px;
        }

        .intro-logo.show {
            opacity: 1;
            transform: scale(1);
            filter: drop-shadow(0 0 30px rgba(46,204,64,0.6));
        }

        .typewriter-text {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            color: #2ecc40;
            margin-bottom: 20px;
            min-height: 100px;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(46,204,64,0.5);
        }

        .typewriter-sub {
            font-size: 1.2rem;
            color: #aac8ff;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .typewriter-sub.show {
            opacity: 1;
        }

        .btn-start {
            background: linear-gradient(135deg, #2ecc40, #27ae60);
            border: none;
            padding: 16px 48px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #0a2a0a;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 0 25px rgba(46,204,64,0.6);
            transition: transform 0.2s, box-shadow 0.2s;
            opacity: 0;
            transform: translateY(20px);
        }

        .btn-start.show {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-start:active {
            transform: scale(0.96);
        }

        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 250;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
        }

        /* ===== ПЕРЕХОД ===== */
        #transitionScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 300;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #000;
        }

        .satellite-view {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0f2a, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .satellite-view img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .satellite-text {
            position: absolute;
            color: white;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 40px;
            bottom: 80px;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }

        .lyceum-zoom {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(1.3);
            transition: all 1.5s ease-out;
            z-index: 2;
            background: #000;
        }

        .lyceum-zoom.show {
            opacity: 1;
            transform: scale(1);
        }

        .lyceum-zoom img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== ИГРА ===== */
        #gameScreen {
            min-height: 100vh;
            display: none;
            padding: 20px;
            background-size: cover;
            background-position: center;
            transition: background-image 0.6s ease-in-out;
            position: relative;
        }

        #gameScreen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 8, 18, 0.75);
            backdrop-filter: blur(2px);
            z-index: 0;
        }

        .game-container {
            position: relative;
            z-index: 2;
            max-width: 700px;
            margin: 0 auto;
            background: rgba(10, 18, 35, 0.88);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            border: 1px solid rgba(46,204,64,0.2);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 24px;
            font-weight: bold;
            color: white;
            border-left: 3px solid #2ecc40;
        }

        .question-text {
            font-size: 1.55rem;
            font-weight: 700;
            color: white;
            margin: 20px 0;
            line-height: 1.4;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: rgba(14, 26, 43, 0.9);
            border: 1px solid #2ecc40;
            border-radius: 60px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
        }

        .option-btn:hover {
            background: rgba(46,204,64,0.2);
            transform: translateX(5px);
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .feedback-message {
            background: rgba(7, 17, 38, 0.95);
            border-radius: 28px;
            padding: 16px;
            margin-top: 20px;
            color: #eef;
            border-left: 5px solid #2ecc40;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .btn {
            background: #2ecc40;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            color: #0a2a0a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn:hover {
            background: #27ae60;
            transform: scale(1.02);
        }

        .final-chance {
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(135deg, #2ecc40, #f9ca24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .contacts {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
        }

        .contacts a {
            color: #8bb9fe;
            text-decoration: none;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 40px;
            transition: 0.2s;
        }

        .contacts a:hover {
            background: #2ecc40;
            color: #000;
        }

        .hidden {
            display: none;
        }

        .contact-input-field {
            width: 100%;
            padding: 14px 20px;
            border-radius: 60px;
            border: 1px solid #2ecc40;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 1rem;
            margin: 15px 0;
            outline: none;
        }

        .contact-input-field:focus {
            border-color: #2ecc40;
            box-shadow: 0 0 10px rgba(46,204,64,0.3);
        }

        @media (max-width: 550px) {
            .typewriter-text { font-size: 1.6rem; }
            .question-text { font-size: 1.2rem; }
            .game-container { padding: 16px; }
            .btn-start { padding: 12px 32px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div id="introScreen">
    <div class="flash" id="flash"></div>
    <img class="intro-logo" id="introLogo" src="logo.png" alt="ЛАП №135" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<div style=\"font-size:80px;\">🧪⚛️</div>')">
    <div class="typewriter-text" id="typewriter"></div>
    <div class="typewriter-sub" id="typewriterSub">Проверь свои шансы!</div>
    <button class="btn-start" id="startIntroBtn">🚀 Начать!</button>
</div>

<div id="transitionScreen">
    <div class="satellite-view">
        <img id="satelliteImg" src="satellite.jpg" alt="Спутник" onerror="this.src=''; this.parentElement.innerHTML='<div style=\"font-size:80px;\">🛰️</div><div class=\"satellite-text\">Снимок со спутника...</div>'">
        <div class="satellite-text">🛰️ Снимок со спутника...</div>
    </div>
    <div class="lyceum-zoom" id="lyceumZoom">
        <img id="lyceumImg" src="lyceum.jpg" alt="Лицей №135" onerror="this.src=''; this.parentElement.innerHTML='<div style=\"font-size:80px;\">🏫</div>'">
    </div>
</div>

<div id="gameScreen">
    <div class="game-container">
        <div class="stats-bar">
            <span id="questionCounter">Вопрос 1 / 5</span>
            <span>🎯 Шанс: <span id="currentChance">0</span>%</span>
        </div>
        <div class="question-text" id="questionText"></div>
        <div class="options-grid" id="optionsContainer"></div>
        <button class="btn" id="abortGameBtn">✖️ Завершить игру</button>
        <div id="feedbackArea" class="feedback-message hidden"></div>
    </div>
</div>

<script>
    // Фоны (17 штук)
    const gameBackgrounds = [];
    for (let i = 1; i <= 17; i++) {
        gameBackgrounds.push(`bg${i}.jpg`);
    }
    let bgIndex = 0;
    let bgInterval = null;

    let introMusic = null;
    let gameMusic = null;

    // Музыка
    function playIntroMusic() {
        try {
            introMusic = new Audio('intro-music.mp3');
            introMusic.loop = true;
            introMusic.volume = 0.35;
            introMusic.play().catch(e => console.log('intro-music.mp3 не найден'));
        } catch(e) {}
    }

    function stopIntroMusic() {
        if (introMusic) {
            introMusic.pause();
            introMusic = null;
        }
    }

    function startGameMusic() {
        try {
            gameMusic = new Audio('game-music.mp3');
            gameMusic.loop = true;
            gameMusic.volume = 0.35;
            gameMusic.play().catch(e => console.log('game-music.mp3 не найден'));
        } catch(e) {}
    }

    function stopGameMusic() {
        if (gameMusic) {
            gameMusic.pause();
            gameMusic = null;
        }
    }

    // Плавная смена фона с проверкой существования файла
    function setGameBackground(bgName) {
        const gameScreen = document.getElementById('gameScreen');
        const img = new Image();
        img.onload = () => {
            gameScreen.style.backgroundImage = `url('${bgName}')`;
            gameScreen.style.backgroundSize = 'cover';
            gameScreen.style.backgroundPosition = 'center';
        };
        img.onerror = () => {
            // если файла нет — красиво градиент + звёздный эффект
            gameScreen.style.backgroundImage = 'radial-gradient(ellipse at 40% 50%, #0f172a, #020617)';
        };
        img.src = bgName;
    }

    function startBackgroundRotation() {
        if (bgInterval) clearInterval(bgInterval);
        // установить первый фон
        setGameBackground(gameBackgrounds[0]);
        bgInterval = setInterval(() => {
            bgIndex = (bgIndex + 1) % gameBackgrounds.length;
            setGameBackground(gameBackgrounds[bgIndex]);
        }, 10000);
    }

    function stopBackgroundRotation() {
        if (bgInterval) {
            clearInterval(bgInterval);
            bgInterval = null;
        }
    }

    // Частицы и формулы
    const formulas = ['E=mc²', 'F=ma', '∫eˣ dx', 'πr²', 'a²+b²=c²', 'Δx·Δp≥ħ/2', 'v=s/t', 'PV=nRT', '∇·B=0', 'F=G·m₁m₂/r²'];
    
    function createFloatingFormulas() {
        const intro = document.getElementById('introScreen');
        for (let i = 0; i < 20; i++) {
            const formula = document.createElement('div');
            formula.className = 'formula';
            formula.textContent = formulas[Math.floor(Math.random() * formulas.length)];
            formula.style.left = Math.random() * 100 + '%';
            formula.style.fontSize = (Math.random() * 22 + 12) + 'px';
            formula.style.animationDuration = Math.random() * 14 + 9 + 's';
            formula.style.animationDelay = Math.random() * 9 + 's';
            intro.appendChild(formula);
        }
    }
    
    function createParticles() {
        const intro = document.getElementById('introScreen');
        for (let i = 0; i < 100; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 1.5;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 6 + 4 + 's';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.opacity = Math.random() * 0.6 + 0.2;
            intro.appendChild(particle);
        }
    }
    
    createParticles();
    createFloatingFormulas();
    
    // Печатный текст
    const fullText = "Физмат-челлендж";
    let textIndex = 0;
    function typeWriter() {
        const el = document.getElementById('typewriter');
        if (textIndex < fullText.length) {
            el.innerHTML += fullText.charAt(textIndex);
            textIndex++;
            setTimeout(typeWriter, 90);
        } else {
            setTimeout(() => {
                document.getElementById('typewriterSub').classList.add('show');
                document.getElementById('startIntroBtn').classList.add('show');
            }, 300);
        }
    }
    
    // Запуск заставки
    setTimeout(() => {
        const flash = document.getElementById('flash');
        flash.style.opacity = '1';
        setTimeout(() => { flash.style.opacity = '0'; }, 150);
        const logo = document.getElementById('introLogo');
        if (logo) logo.classList.add('show');
        setTimeout(() => {
            typeWriter();
            playIntroMusic();
        }, 500);
    }, 500);
    
    // Переход спутник -> лицей
    function playTransitionToLyceum() {
        return new Promise((resolve) => {
            const transitionDiv = document.getElementById('transitionScreen');
            const lyceumZoom = document.getElementById('lyceumZoom');
            transitionDiv.style.display = 'flex';
            setTimeout(() => {
                lyceumZoom.classList.add('show');
                setTimeout(() => {
                    transitionDiv.style.display = 'none';
                    lyceumZoom.classList.remove('show');
                    resolve();
                }, 1500);
            }, 2000);
        });
    }
    
    // БАНК ВОПРОСОВ (10 штук)
    const QUESTION_BANK = [
        { text: "Что тяжелее: 1 кг пуха или 1 кг железа?", options: ["Пух", "Железо", "Одинаково", "Зависит от места"], correct: 2, explanation: "Килограмм есть килограмм. Масса одинаковая.", comfort: "Не переживай, это ловушка, в которую попадается каждый второй!" },
        { text: "Если вы подниметесь на гору высотой 1 км, вы похудеете?", options: ["Да, заметно", "Да, но совсем чуть-чуть", "Нет, вес не изменится", "Нет, даже потолстеете"], correct: 1, explanation: "Сила тяжести с высотой уменьшается, вес становится меньше на граммы.", comfort: "Отличная идея — худеть, гуляя в горы! Но придётся всё равно считать калории." },
        { text: "Что быстрее нагреется на солнце: белая футболка или чёрная?", options: ["Белая", "Чёрная", "Одинаково", "Зависит от ветра"], correct: 1, explanation: "Чёрный цвет поглощает почти все лучи света и превращает их в тепло.", comfort: "Любишь чёрный? Летом это дорого обходится!" },
        { text: "Как разделить 5 яблок между 5 детьми, чтобы одно осталось в корзине?", options: ["Отдать 4 яблока", "Отдать яблоки вместе с корзиной", "Съесть одно самому", "Так нельзя"], correct: 1, explanation: "Четырём детям отдать по яблоку, а пятому — яблоко вместе с корзиной.", comfort: "Хитрая логическая задачка. Теперь ты будешь знать — корзину тоже можно раздавать!" },
        { text: "Что произойдёт с часами в сауне?", options: ["Начнут спешить", "Начнут отставать", "Остановятся", "Будут идти точно"], correct: 0, explanation: "Металлические детали от нагрева расширяются, часы спешат.", comfort: "Сауна — место для отдыха, а не для точного хронометража." },
        { text: "Ускорение камня в верхней точке полёта?", options: ["0", "9,8 м/с² вниз", "9,8 м/с² вверх", "Зависит от массы"], correct: 1, explanation: "Ускорение свободного падения действует на камень всегда.", comfort: "Многие думают, что раз скорость ноль — то и ускорения нет. Но Земля никуда не девается!" },
        { text: "Что длиннее: экватор или меридиан?", options: ["Экватор", "Меридиан", "Одинаково", "Неизвестно"], correct: 0, explanation: "Земля сплюснута у полюсов, поэтому экватор длиннее на 67 км.", comfort: "Разница настолько мала, что на картах её не видно." },
        { text: "Почему металл кажется холоднее дерева в мороз?", options: ["Металл холоднее", "Металл быстрее отводит тепло", "Дерево нагревается", "Просто ощущение"], correct: 1, explanation: "Металл отлично проводит тепло и быстро «вытягивает» его из руки.", comfort: "Ты просто слишком честный: если холодно — сразу говоришь об этом." },
        { text: "На сколько удлинить верёвку, чтобы она провисла на 1 м над Землёй?", options: ["6,28 м", "1 м", "628 м", "1 км"], correct: 0, explanation: "Из формулы C = 2πR увеличение радиуса на 1 м даёт удлинение на 2π ≈ 6,28 м.", comfort: "Интуиция подсказывала километры, а математика говорит — 6 метров. Удивительно!" },
        { text: "Почему солнце утром и вечером кажется больше?", options: ["Оно ближе", "Иллюзия из-за горизонта", "Преломление света", "Меняет размер"], correct: 1, explanation: "На горизонте мы сравниваем солнце с деревьями и домами — оно кажется огромным.", comfort: "Твой глаз иногда обманывает тебя. И это нормально!" }
    ];
    
    let currentGameQuestions = [];
    let currentQIndex = 0;
    let currentChance = 0;
    let waitingForNext = false;
    let timeoutId = null;
    
    function getRandomQuestions(count) {
        const shuffled = [...QUESTION_BANK];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
    }
    
    function updateUIStats() {
        document.getElementById('questionCounter').innerHTML = `📋 Вопрос ${currentQIndex+1} / ${currentGameQuestions.length}`;
        document.getElementById('currentChance').innerText = currentChance;
    }
    
    function renderCurrentQuestion() {
        if (currentQIndex >= currentGameQuestions.length) {
            finishGame();
            return;
        }
        const q = currentGameQuestions[currentQIndex];
        document.getElementById('questionText').innerText = q.text;
        const container = document.getElementById('optionsContainer');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `${String.fromCharCode(65+idx)}. ${opt}`;
            btn.addEventListener('click', () => handleAnswer(idx));
            container.appendChild(btn);
        });
        document.getElementById('feedbackArea').classList.add('hidden');
        waitingForNext = false;
        // разблокировка кнопок
        document.querySelectorAll('.option-btn').forEach(btn => btn.style.pointerEvents = 'auto');
    }
    
    function handleAnswer(selectedIdx) {
        if (waitingForNext) return;
        const currentQ = currentGameQuestions[currentQIndex];
        const isCorrect = (selectedIdx === currentQ.correct);
        
        if (isCorrect) {
            let newChance = currentChance + 18;
            if (newChance > 90) newChance = 90;
            currentChance = newChance;
            document.getElementById('feedbackArea').innerHTML = `<span style="color:#8effa5;">✅ ПРАВИЛЬНО! +18% к шансу</span><br>📘 ${currentQ.explanation}<br>✨ ${currentQ.comfort}`;
        } else {
            const correctLetter = String.fromCharCode(65+currentQ.correct);
            document.getElementById('feedbackArea').innerHTML = `<span style="color:#ffae70;">❌ НЕПРАВИЛЬНО. Шанс обнулён!</span><br>Верный ответ: ${correctLetter}. ${currentQ.options[currentQ.correct]}<br>📘 ${currentQ.explanation}<br>💪 ${currentQ.comfort}`;
            currentChance = 0;
        }
        document.getElementById('feedbackArea').classList.remove('hidden');
        document.querySelectorAll('.option-btn').forEach(btn => btn.style.pointerEvents = 'none');
        waitingForNext = true;
        updateUIStats();
        
        if (timeoutId) clearTimeout(timeoutId);
        timeoutId = setTimeout(() => {
            currentQIndex++;
            if (currentQIndex < currentGameQuestions.length) {
                waitingForNext = false;
                renderCurrentQuestion();
            } else {
                finishGame();
            }
            timeoutId = null;
        }, 2000);
    }
    
    function finishGame() {
        if (timeoutId) clearTimeout(timeoutId);
        stopBackgroundRotation();
        stopGameMusic();
        
        const container = document.querySelector('#gameScreen .game-container');
        const finalPercent = currentChance;
        let encouragement = "";
        if (finalPercent >= 70) encouragement = "🔥 Ты настоящий физмат-боец! Поступление почти гарантировано!";
        else if (finalPercent >= 40) encouragement = "✨ Хороший результат! Подтяни пару тем и всё получится.";
        else encouragement = "💪 Не сдавайся! Выучи физику с математикой — у тебя огромный потенциал!";
        
        container.innerHTML = `
            <div style="text-align:center; padding:20px;">
                <div class="final-chance">${finalPercent}%</div>
                <p style="color:white; margin:20px; font-size:1.2rem;">${encouragement}</p>
                <input type="text" id="finalContactInput" class="contact-input-field" placeholder="📱 Телефон или @username" autocomplete="off">
                <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
                    <button id="saveContactFinalBtn" class="btn" style="background:#2c3e66;">💾 Оставить контакт</button>
                    <button id="playAgainFinalBtn" class="btn">🔄 Сыграть ещё раз</button>
                </div>
                <div class="contacts" style="margin-top:25px;">
                    <a href="https://forms.yandex.ru/u/69d495094936395d76329310/" target="_blank">📝 Яндекс Форма</a>
                    <a href="https://lap-samara.ru" target="_blank">🌐 Сайт</a>
                    <a href="https://vk.com/lap135" target="_blank">📘 VK</a>
                    <a href="https://t.me/s/lap135" target="_blank">📱 Telegram</a>
                    <a href="tel:+78469954245">📞 Телефон</a>
                </div>
            </div>
        `;
        
        document.getElementById('saveContactFinalBtn')?.addEventListener('click', () => {
            const contact = document.getElementById('finalContactInput').value.trim();
            if (contact) {
                console.log("[КОНТАКТ СОХРАНЁН]:", contact);
                alert(`Спасибо, ${contact}! Мы свяжемся.`);
            } else {
                alert("Вы не ввели контакт, но старания засчитаны!");
            }
        });
        
        document.getElementById('playAgainFinalBtn')?.addEventListener('click', () => {
            location.reload();
        });
    }
    
    function startNewGame() {
        currentGameQuestions = getRandomQuestions(5);
        currentQIndex = 0;
        currentChance = 0;
        waitingForNext = false;
        updateUIStats();
        renderCurrentQuestion();
    }
    
    // Старт игры после перехода
    document.getElementById('startIntroBtn').addEventListener('click', async () => {
        stopIntroMusic();
        const flash = document.getElementById('flash');
        flash.style.opacity = '1';
        setTimeout(() => { flash.style.opacity = '0'; }, 200);
        const intro = document.getElementById('introScreen');
        intro.style.opacity = '0';
        setTimeout(async () => {
            intro.style.display = 'none';
            await playTransitionToLyceum();
            document.getElementById('gameScreen').style.display = 'block';
            startGameMusic();
            startBackgroundRotation();
            startNewGame();
        }, 1000);
    });
    
    // Кнопка завершения игры
    document.getElementById('abortGameBtn').addEventListener('click', () => {
        location.reload();
    });
</script>
</body>
</html>
