<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Физмат-челлендж | Проверь свои шансы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* легкая стилизация, не ломает ввод */
        }

        body {
            min-height: 100vh;
            background: #0a0c12;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Контейнер игры (управляет z-index, переключениями) */
        .game-container {
            width: 100%;
            max-width: 700px;
            min-height: 600px;
            margin: 20px;
            border-radius: 48px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }

        /* Универсальные панели (заставка, игра, финал, переходы) */
        .screen {
            width: 100%;
            border-radius: 48px;
            background: rgba(10, 12, 18, 0.85);
            backdrop-filter: blur(2px);
            padding: 20px 24px 32px;
            transition: opacity 0.3s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* Тёмный радиальный градиент для заставки */
        .splash-gradient {
            background: radial-gradient(circle at center, #141824, #010101);
        }

        /* Фон игры (динамически меняется через js) */
        .game-bg-dynamic {
            transition: background-image 0.4s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        /* Кнопки и элементы */
        .glow-btn {
            background: #2ecc40;
            border: none;
            padding: 14px 28px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 60px;
            color: #0a0c12;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(46,204,64,0.3);
            transition: transform 0.1s ease, background 0.2s;
            font-family: inherit;
        }
        .glow-btn:active {
            transform: scale(0.96);
        }
        .option-btn {
            background: #1e1f2c;
            border: 1px solid #2ecc40;
            color: #eef;
            padding: 12px 16px;
            border-radius: 40px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s;
            margin: 8px 0;
            font-weight: 500;
        }
        .option-btn:hover {
            background: #2ecc4022;
            border-color: #2ecc40;
        }
        .progress-text {
            font-size: 1rem;
            background: #00000066;
            padding: 6px 16px;
            border-radius: 60px;
            display: inline-block;
        }
        .chance-badge {
            font-size: 1.6rem;
            font-weight: bold;
            background: #2ecc4022;
            backdrop-filter: blur(4px);
            padding: 6px 18px;
            border-radius: 60px;
            border-left: 4px solid #2ecc40;
        }
        .explanation-box {
            background: #000000aa;
            border-radius: 28px;
            padding: 16px;
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.4;
            color: white;
            border-left: 3px solid #2ecc40;
        }
        input, .contact-input {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: none;
            background: #1e1f2c;
            color: white;
            font-size: 1rem;
            margin: 12px 0;
            outline: none;
            font-family: inherit;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 15px 0;
        }
        .link-icon {
            background: #2c2f3a;
            border-radius: 40px;
            padding: 8px 18px;
            color: #ddd;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.1s;
        }
        .link-icon:hover {
            background: #2ecc40;
            color: #000;
        }
        h2, h3 {
            letter-spacing: -0.3px;
        }
        .typewriter {
            font-family: monospace;
            font-size: 2rem;
            font-weight: bold;
            border-right: 2px solid #2ecc40;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
        }
        @media (max-width: 550px) {
            .typewriter { font-size: 1.4rem; white-space: normal; border-right: none; display: block; text-align: center; }
            .game-container { margin: 12px; }
            .screen { padding: 16px; }
        }
        .fade-flash {
            animation: flashWhite 0.2s ease-out;
        }
        @keyframes flashWhite {
            0% { background-color: rgba(255,255,200,0.9);}
            100% { background-color: transparent; }
        }
        .particle-bg {
            position: absolute;
            top:0; left:0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
            border-radius: 48px;
        }
        .particle {
            position: absolute;
            color: #2ecc4077;
            font-size: 1.1rem;
            opacity: 0.6;
            animation: floatParticle linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }
        img.bg-fallback {
            display: none;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot">
    <!-- Динамические экраны вставляются сюда -->
</div>

<script>
    // -------------------------- БАНК ВОПРОСОВ (10 шт) --------------------------
    const QUESTION_BANK = [
        { text: "Что тяжелее: 1 кг пуха или 1 кг железа?", options: ["Пух", "Железо", "Одинаково", "Зависит от места"], correct: 2, explanation: "Килограмм есть килограмм. Масса одинаковая.", comfort: "Не переживай, это ловушка, в которую попадается каждый второй!" },
        { text: "Если вы подниметесь на гору высотой 1 км, вы похудеете?", options: ["Да, заметно", "Да, но совсем чуть-чуть", "Нет, вес не изменится", "Нет, даже потолстеете"], correct: 1, explanation: "Сила тяжести с высотой уменьшается, вес становится меньше на граммы.", comfort: "Отличная идея — худеть, гуляя в горы! Но придётся всё равно считать калории." },
        { text: "Что быстрее нагреется на солнце: белая футболка или чёрная?", options: ["Белая", "Чёрная", "Одинаково", "Зависит от ветра"], correct: 1, explanation: "Чёрный цвет поглощает почти все лучи света и превращает их в тепло.", comfort: "Любишь чёрный? Летом это дорого обходится!" },
        { text: "Как разделить 5 яблок между 5 детьми, чтобы одно яблоко осталось в корзине?", options: ["Отдать 4 яблока", "Отдать яблоки вместе с корзиной", "Съесть одно самому", "Так нельзя"], correct: 1, explanation: "Четырём детям отдать по яблоку, а пятому — яблоко вместе с корзиной.", comfort: "Хитрая логическая задачка. Теперь ты будешь знать — корзину тоже можно раздавать!" },
        { text: "Что произойдёт с обычными механическими часами, если их перенести из квартиры в сауну?", options: ["Начнут спешить", "Начнут отставать", "Остановятся", "Будут идти точно так же"], correct: 0, explanation: "Металлические детали от нагрева расширяются, маятник или пружина меняют свойства, часы спешат.", comfort: "Сауна — место для отдыха, а не для точного хронометража." },
        { text: "Камень бросили вертикально вверх. В самой верхней точке его скорость равна нулю. Чему равно ускорение камня в этот момент?", options: ["0", "9,8 м/с² вниз", "9,8 м/с² вверх", "Зависит от массы камня"], correct: 1, explanation: "Ускорение свободного падения действует на камень всегда, даже в верхней точке.", comfort: "Многие думают, что раз скорость ноль — то и ускорения нет. Но Земля никуда не девается!" },
        { text: "Что длиннее: окружность Земли по экватору или меридиану?", options: ["Экватор", "Меридиан", "Одинаково", "Точно неизвестно"], correct: 0, explanation: "Земля сплюснута у полюсов, поэтому экватор чуть длиннее меридиана — примерно на 67 км.", comfort: "Честно говоря, разница настолько мала, что на картах её не видно." },
        { text: "Почему в сильный мороз металлические предметы на улице кажутся холоднее деревянных?", options: ["Металл холоднее по температуре", "Металл быстрее отводит тепло от руки", "Дерево нагревается солнцем", "Это просто ощущение, разницы нет"], correct: 1, explanation: "Металл отлично проводит тепло и быстро «вытягивает» его из руки.", comfort: "Ты просто слишком честный: если холодно — сразу говоришь об этом." },
        { text: "Представьте Землю как идеальный шар. Вы обмотали её верёвкой по экватору. На сколько нужно удлинить верёвку, чтобы она провисла ровно на 1 метр над поверхностью?", options: ["На 6,28 метра", "На 1 метр", "На 628 метров", "На 1 километр"], correct: 0, explanation: "Из формулы C = 2πR увеличение радиуса на 1 м даёт удлинение на 2π ≈ 6,28 м.", comfort: "Интуиция подсказывала километры, а математика говорит — 6 метров. Удивительно, правда?" },
        { text: "Почему вечером и утром солнце на небе выглядит больше, чем в полдень?", options: ["Оно действительно ближе к Земле", "Это иллюзия из-за сравнения с предметами на горизонте", "Из-за преломления света в атмосфере", "Вечером солнце меняет размер"], correct: 1, explanation: "На горизонте мы сравниваем солнце с деревьями и домами — оно кажется огромным.", comfort: "Твой глаз иногда обманывает тебя. И это нормально — так устроено зрение." }
    ];

    // Глобальные переменные
    let activeScreen = "splash"; // splash, transitionSat, transitionLyceum, game, final
    let currentQuestions = [];    // выбранные 5 уникальных
    let qIndex = 0;
    let currentChance = 0;       // от 0% до 90%
    let waitingForNext = false;
    let bgInterval = null;
    let currentBgIndex = 1;       // bg1.jpg ... bg17
    let gameAudio = null;
    let introAudio = null;
    let bgCycleTimeout = null;

    // DOM root
    const root = document.getElementById("gameRoot");

    // Вспомогательные функции загрузки изображений (без ошибок)
    function getBgImageUrl(num) {
        return `bg${num}.jpg`;
    }

    // Переключение фонов игры (цикл 17)
    function startBgRotation() {
        if (bgInterval) clearInterval(bgInterval);
        bgInterval = setInterval(() => {
            const gameScreenDiv = document.querySelector(".game-bg-dynamic");
            if (gameScreenDiv && activeScreen === "game") {
                currentBgIndex = (currentBgIndex % 17) + 1;
                const url = getBgImageUrl(currentBgIndex);
                const img = new Image();
                img.onload = () => { gameScreenDiv.style.backgroundImage = `url('${url}')`; };
                img.onerror = () => { gameScreenDiv.style.backgroundImage = "radial-gradient(circle at 30% 20%, #1a2639, #070a12)"; };
                img.src = url;
            } else if (activeScreen !== "game") {
                // пауза ротации, если не в игре
                return;
            }
        }, 10000);
    }

    function stopBgRotation() {
        if (bgInterval) clearInterval(bgInterval);
        bgInterval = null;
    }

    // Звуки: инициализация с защитой от отсутствия файлов
    function playIntroMusic() {
        if (introAudio) { introAudio.pause(); introAudio.currentTime = 0; }
        introAudio = new Audio("intro-music.mp3");
        introAudio.loop = true;
        introAudio.volume = 0.5;
        introAudio.play().catch(e => console.log("intro-music.mp3 не найден или ошибка:", e));
    }
    function stopIntroMusic() {
        if (introAudio) { introAudio.pause(); introAudio.currentTime = 0; introAudio = null; }
    }
    function playGameMusic() {
        if (gameAudio) { gameAudio.pause(); gameAudio.currentTime = 0; }
        gameAudio = new Audio("game-music.mp3");
        gameAudio.loop = true;
        gameAudio.volume = 0.45;
        gameAudio.play().catch(e => console.log("game-music.mp3 не найден или ошибка:", e));
    }
    function stopGameMusic() {
        if (gameAudio) { gameAudio.pause(); gameAudio.currentTime = 0; gameAudio = null; }
    }

    // Вспышка (анимация на контейнере)
    function flashEffect() {
        const container = document.querySelector(".game-container");
        if (!container) return;
        container.classList.add("fade-flash");
        setTimeout(() => container.classList.remove("fade-flash"), 250);
    }

    // Утилита: получить 5 случайных уникальных вопросов
    function getRandomQuestions() {
        const shuffled = [...QUESTION_BANK];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, 5);
    }

    // ---- Игровая логика ----
    function renderGameScreen() {
        if (!currentQuestions.length) currentQuestions = getRandomQuestions();
        if (qIndex >= currentQuestions.length) {
            showFinalScreen();
            return;
        }
        const q = currentQuestions[qIndex];
        const percent = Math.min(currentChance, 90);
        const html = `
            <div class="screen game-bg-dynamic" style="background: radial-gradient(circle at 20% 30%, #10141e, #03050a); transition: background-image 0.3s;">
                <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap:wrap; gap:10px; margin-bottom: 20px;">
                    <span class="progress-text">📋 Вопрос ${qIndex+1}/5</span>
                    <span class="chance-badge">🎯 Шанс: ${percent}%</span>
                </div>
                <h3 style="margin: 20px 0 20px; color:#fff; font-size:1.65rem;">${escapeHtml(q.text)}</h3>
                <div id="optionsContainer">
                    ${q.options.map((opt, idx) => `<button class="option-btn" data-opt-index="${idx}">${escapeHtml(opt)}</button>`).join('')}
                </div>
                <button id="quitGameBtn" style="margin-top: 35px; background:#3a2c3f; border-color:#ff7b72;">🏠 Завершить игру</button>
                <div id="explainBox" class="explanation-box" style="display:none;"></div>
            </div>
        `;
        root.innerHTML = html;
        // Установка фона bg по текущему индексу
        const bgDiv = document.querySelector(".game-bg-dynamic");
        const tryBg = getBgImageUrl(currentBgIndex);
        const testImg = new Image();
        testImg.onload = () => { if(bgDiv) bgDiv.style.backgroundImage = `url('${tryBg}')`; };
        testImg.onerror = () => { if(bgDiv) bgDiv.style.backgroundImage = "radial-gradient(circle at 20% 30%, #10141e, #03050a)"; };
        testImg.src = tryBg;

        // Обработчики кнопок
        document.querySelectorAll(".option-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                if (waitingForNext) return;
                const selectedIdx = parseInt(btn.dataset.optIndex);
                handleAnswer(selectedIdx);
            });
        });
        document.getElementById("quitGameBtn").addEventListener("click", () => {
            resetToSplashFull();
        });
    }

    function handleAnswer(selectedIdx) {
        if (waitingForNext) return;
        const q = currentQuestions[qIndex];
        const isCorrect = (selectedIdx === q.correct);
        let increment = 0;
        if (isCorrect) {
            increment = 18;
            currentChance = Math.min(currentChance + increment, 90);
        } else {
            currentChance = 0;
        }
        const newPercent = Math.min(currentChance, 90);
        // показать объяснение + утешение
        const explainHtml = `<strong>📘 Объяснение:</strong> ${escapeHtml(q.explanation)}<br><strong>😌 Утешение:</strong> ${escapeHtml(q.comfort)}<br><span style="font-size:0.9rem;">${isCorrect ? '✅ +18% к шансу!' : '❌ Шанс обнулён до 0%'}</span>`;
        const explainBox = document.getElementById("explainBox");
        if (explainBox) {
            explainBox.style.display = "block";
            explainBox.innerHTML = explainHtml;
        }
        waitingForNext = true;
        // Блокируем кнопки
        document.querySelectorAll(".option-btn").forEach(btn => btn.disabled = true);
        setTimeout(() => {
            waitingForNext = false;
            qIndex++;
            if (qIndex < currentQuestions.length) {
                renderGameScreen();
            } else {
                showFinalScreen();
            }
        }, 2800);
    }

    function showFinalScreen() {
        stopBgRotation();
        activeScreen = "final";
        const finalPercent = Math.min(currentChance, 90);
        let message = "";
        if (finalPercent >= 70) message = "🔥 Ты настоящий физмат-боец! Поступление почти гарантировано!";
        else if (finalPercent >= 40) message = "✨ Хороший результат! Подтяни пару тем и всё получится.";
        else message = "💪 Не сдавайся! Выучи физику с математикой — у тебя огромный потенциал!";
        const html = `
            <div class="screen" style="background: #0b0e17; text-align:center;">
                <h2>🎓 Результат челленджа</h2>
                <div style="font-size:3rem; margin: 20px 0; background: #2ecc4020; border-radius: 80px; padding:10px;">${finalPercent}%</div>
                <p style="font-size:1.2rem;">${message}</p>
                <div style="margin: 20px 0;">
                    <input type="text" id="contactInput" class="contact-input" placeholder="📱 Телефон или @username" autocomplete="off">
                    <div class="flex-row">
                        <button id="saveContactBtn" class="glow-btn" style="background:#2c3e66;">💾 Оставить контакт</button>
                        <button id="playAgainBtn" class="glow-btn">🔄 Сыграть ещё раз</button>
                    </div>
                </div>
                <div style="margin-top: 10px;">
                    <a href="https://forms.yandex.ru/u/69d495094936395d76329310/" target="_blank" class="link-icon">📝 Яндекс Форма</a>
                    <a href="https://lap-samara.ru" target="_blank" class="link-icon">🌐 Сайт</a>
                    <a href="https://vk.com/lap135" target="_blank" class="link-icon">📱 VK</a>
                    <a href="https://t.me/s/lap135" target="_blank" class="link-icon">✈️ Telegram</a>
                    <a href="tel:+78469954245" class="link-icon">📞 Телефон</a>
                </div>
                <p style="margin-top: 25px; font-size:0.75rem; opacity:0.7;">Физмат-челлендж 2025</p>
            </div>
        `;
        root.innerHTML = html;
        document.getElementById("saveContactBtn")?.addEventListener("click", () => {
            const contact = document.getElementById("contactInput").value.trim();
            if (contact) console.log("[КОНТАКТ СОХРАНЁН]:", contact);
            else console.log("[КОНТАКТ]: пустое поле");
            alert(contact ? `Спасибо, ${contact}! Мы свяжемся.` : "Вы не ввели контакт, но старания засчитаны!");
        });
        document.getElementById("playAgainBtn")?.addEventListener("click", () => {
            resetToSplashFull();
        });
    }

    // ---- Переход: спутник -> лицей ----
    function startTransitionSequence() {
        activeScreen = "transitionSat";
        stopIntroMusic();
        stopGameMusic();
        // показ спутника
        const satHtml = `<div class="screen" style="text-align:center; background:#000000aa; backdrop-filter:blur(8px);"><img id="satImg" style="max-width:90%; border-radius:32px; margin:20px 0;" alt="satellite"><h2 style="color:white;">🛰️ Снимок со спутника...</h2></div>`;
        root.innerHTML = satHtml;
        const satImgElem = document.getElementById("satImg");
        if (satImgElem) {
            const img = new Image();
            img.onload = () => { satImgElem.src = "satellite.jpg"; };
            img.onerror = () => { satImgElem.src = ""; satImgElem.outerHTML = '<div style="background:#2e2f3a; padding:40px; border-radius:32px;">🛰️ Спутник (изображение отсутствует)</div>'; };
            img.src = "satellite.jpg";
        }
        setTimeout(() => {
            activeScreen = "transitionLyceum";
            const lyceumHtml = `<div class="screen" style="text-align:center; background:#000000aa;"><div id="lyceumZoom" style="transition: transform 1.5s ease-out; transform: scale(0.95);"><img id="lyceumImg" style="max-width:100%; border-radius:32px; box-shadow:0 0 20px cyan;"><h3 style="color:white;">🔍 Лицей ... приближение</h3></div></div>`;
            root.innerHTML = lyceumHtml;
            const lyImg = document.getElementById("lyceumImg");
            if (lyImg) {
                const test = new Image();
                test.onload = () => { lyImg.src = "lyceum.jpg"; };
                test.onerror = () => { lyImg.src = ""; lyImg.outerHTML = '<div style="background: #1f2230; padding:40px;">🏫 Фото лицея (lyceum.jpg не найден)</div>'; };
                test.src = "lyceum.jpg";
            }
            const zoomDiv = document.getElementById("lyceumZoom");
            if (zoomDiv) setTimeout(() => { if(zoomDiv) zoomDiv.style.transform = "scale(1.08)"; }, 50);
            setTimeout(() => {
                startGameAfterTransit();
            }, 1500);
        }, 2000);
    }

    function startGameAfterTransit() {
        activeScreen = "game";
        // Инициализация игры
        currentQuestions = getRandomQuestions();
        qIndex = 0;
        currentChance = 0;
        waitingForNext = false;
        currentBgIndex = 1;
        playGameMusic();
        startBgRotation();
        renderGameScreen();
    }

    // ---- Заставка с частицами, логотип, печатный текст ----
    function buildSplash() {
        activeScreen = "splash";
        if (introAudio) introAudio.pause();
        playIntroMusic();
        const particleHTML = `<div class="particle-bg" id="particlesField"></div>`;
        const splashDiv = document.createElement("div");
        splashDiv.className = "screen splash-gradient";
        splashDiv.style.position = "relative";
        splashDiv.style.overflow = "hidden";
        splashDiv.innerHTML = `
            ${particleHTML}
            <div id="splashContent" style="text-align:center; position:relative; z-index:3; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height: 500px;">
                <div id="logoArea" style="opacity:0; transition: opacity 0.3s;"><img id="mainLogo" style="max-width:180px; margin-bottom:20px;" alt="logo"></div>
                <div id="typewriterText" style="font-size:2rem; font-weight:bold; color:#2ecc40; margin:20px 0;"></div>
                <div id="subtitle" style="opacity:0; margin:10px 0 20px; font-size:1.2rem;">Проверь свои шансы!</div>
                <button id="startButtonGame" style="display:none;" class="glow-btn">🚀 Начать!</button>
            </div>
        `;
        root.innerHTML = "";
        root.appendChild(splashDiv);
        // частицы
        const particlesField = document.getElementById("particlesField");
        const formulas = ["E=mc²", "F=ma", "∫eˣ", "∇·B=0", "PV=nRT", "E=hν", "a²+b²=c²"];
        for (let i=0;i<45;i++) {
            const span = document.createElement("div");
            span.className = "particle";
            span.innerText = formulas[Math.floor(Math.random()*formulas.length)];
            span.style.left = Math.random() * 100 + "%";
            span.style.animationDuration = 6 + Math.random() * 10 + "s";
            span.style.animationDelay = Math.random() * 8 + "s";
            span.style.fontSize = 12 + Math.random() * 20 + "px";
            span.style.opacity = 0.2 + Math.random() * 0.5;
            particlesField.appendChild(span);
        }
        const logoImg = document.getElementById("mainLogo");
        if (logoImg) {
            logoImg.onerror = () => { logoImg.src = ""; logoImg.outerHTML = "<div style='font-size:3rem;'>🧪⚛️</div>"; };
            logoImg.src = "logo.png";
        }
        setTimeout(() => {
            const logoArea = document.getElementById("logoArea");
            if (logoArea) logoArea.style.opacity = "1";
            flashEffect();
            setTimeout(() => {
                const textContainer = document.getElementById("typewriterText");
                const fullText = "Физмат-челлендж";
                let i = 0;
                textContainer.innerHTML = "";
                function type() {
                    if (i < fullText.length) {
                        textContainer.innerHTML += fullText.charAt(i);
                        i++;
                        setTimeout(type, 85);
                    } else {
                        document.getElementById("subtitle").style.opacity = "1";
                        const startBtn = document.getElementById("startButtonGame");
                        if (startBtn) startBtn.style.display = "inline-block";
                    }
                }
                type();
            }, 100);
        }, 500);
        const btnStart = document.getElementById("startButtonGame");
        const checkBtn = setInterval(() => {
            const btn = document.getElementById("startButtonGame");
            if (btn) {
                clearInterval(checkBtn);
                btn.addEventListener("click", () => {
                    flashEffect();
                    stopIntroMusic();
                    stopGameMusic();
                    startTransitionSequence();
                });
            }
        }, 100);
    }

    function resetToSplashFull() {
        if (bgInterval) clearInterval(bgInterval);
        if (gameAudio) { gameAudio.pause(); gameAudio = null; }
        if (introAudio) { introAudio.pause(); introAudio = null; }
        activeScreen = "splash";
        buildSplash();
    }

    // Экранирование
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // INIT
    buildSplash();
</script>
</body>
</html>
